<!DOCTYPE html>
<html lang="pl">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Migracja danych — Pawsome</title>
<meta name="robots" content="noindex, nofollow">
<style>
body{font-family:sans-serif;max-width:700px;margin:2rem auto;padding:0 1rem;background:#FAF6F0}
h1{color:#3D4A3A}
.log{background:#fff;border:1px solid #ddd;border-radius:8px;padding:1rem;margin-top:1rem;max-height:60vh;overflow-y:auto;font-family:monospace;font-size:.85rem;line-height:1.6}
.ok{color:green}.err{color:red}.warn{color:orange}
button{background:#3D4A3A;color:#FAF6F0;border:none;padding:.8rem 2rem;border-radius:8px;font-size:1rem;cursor:pointer;margin-top:1rem}

button:disabled{opacity:.5;cursor:not-allowed}

<body>
<h1>Migracja treści do Firestore</h1>
<div id="login-section">
  <p>Zaloguj się jako admin, aby uruchomić migrację.</p>
  <input type="email" id="login-email" placeholder="Email" style="padding:.5rem;border:1px solid #ccc;border-radius:6px;width:250px;margin-right:.5rem">
  <input type="password" id="login-password" placeholder="Hasło" style="padding:.5rem;border:1px solid #ccc;border-radius:6px;width:200px;margin-right:.5rem">
  <button id="btn-login">Zaloguj</button>
  <div id="login-error" style="color:red;margin-top:.5rem"></div>
</div>
<div id="migrate-section" style="display:none">
  <p>Kliknij przycisk, aby przenieść aktualną treść strony do kolekcji <code>siteContent</code> i <code>services</code> w Firestore.</p>
  <button id="btn-migrate">Rozpocznij migrację</button>
</div>
<div class="log" id="log"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
(function() {
  var logEl = document.getElementById('log');
  var btn = document.getElementById('btn-migrate');
  var loginSection = document.getElementById('login-section');
  var migrateSection = document.getElementById('migrate-section');

  function log(msg, cls) {
    var div = document.createElement('div');
    div.className = cls || '';
    div.textContent = msg;
    logEl.appendChild(div);
    logEl.scrollTop = logEl.scrollHeight;
  }

  // Auth state listener — show migrate button when logged in
  var auth = window.PawsomeAuth;
  if (auth) {
    auth.onAuthStateChanged(function(user) {
      if (user) {
        loginSection.style.display = 'none';
        migrateSection.style.display = '';
        log('Zalogowany jako: ' + user.email, 'ok');
      } else {
        loginSection.style.display = '';
        migrateSection.style.display = 'none';
      }
    });
  }

  // Login button
  document.getElementById('btn-login').addEventListener('click', function() {
    var email = document.getElementById('login-email').value;
    var password = document.getElementById('login-password').value;
    var errEl = document.getElementById('login-error');
    errEl.textContent = '';
    if (!auth) { errEl.textContent = 'Firebase Auth niedostępny'; return; }
    auth.signInWithEmailAndPassword(email, password).catch(function(e) {
      errEl.textContent = 'Błąd logowania: ' + e.message;
    });
  });

  btn.addEventListener('click', function() {
    btn.disabled = true;
    if (!auth || !auth.currentUser) {
      log('Nie jesteś zalogowany.', 'err');
      btn.disabled = false;
      return;
    }
    runMigration();
  });

      ctaButtonText: 'Wyślij wiadomość →'

    log('Zapisuję siteContent (batch)...');
    batch.commit().then(function() {
      log('siteContent zapisany pomyślnie!', 'ok');
      return migrateServices(db);
    }).then(function() {
      log('Usługi zapisane pomyślnie!', 'ok');
      return migrateDoctors(db);
    }).then(function() {
      log('Lekarze zaktualizowani pomyślnie!', 'ok');
      log('=== MIGRACJA ZAKOŃCZONA POMYŚLNIE ===', 'ok');

      log('BŁĄD: ' + err.message, 'err');
    });

  function migrateDoctors(db) {
    log('Aktualizuję kolekcję doctors (dodaję nowe pola)...');
    return db.collection('doctors').get().then(function(snapshot) {
      if (snapshot.empty) {
        log('Brak lekarzy w kolekcji doctors — pomijam.', 'warn');
        return;
      }
      var batch = db.batch();
      var order = 1;
      snapshot.forEach(function(doc) {
        batch.update(doc.ref, {
          bio: doc.data().bio || '',
          photoURL: doc.data().photoURL || '',
          displayOrder: doc.data().displayOrder || order,
          showOnWebsite: doc.data().showOnWebsite !== undefined ? doc.data().showOnWebsite : true
        });
        order++;
      });
      return batch.commit();
    });
  }
